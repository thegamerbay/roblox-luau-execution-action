name: Lint Code and Workflows

on:
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - '**.yml'
      - '**.yaml'
  pull_request:
    paths:
      - '**.py'
      - '**.yml'
      - '**.yaml'

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Ruff
        run: pip install ruff==0.3.0

      - name: Run Ruff
        run: ruff check .

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: any
          # Actionlint checks both .github/workflows/*.yml and action.yml
          filter_mode: nofilter
          level: error
